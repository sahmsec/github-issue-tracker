<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Github Issue</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">

    <div class="card bg-base-100 shadow-xl w-full max-w-md p-6 sm:p-8">

        <!-- Header -->
        <div class="flex flex-col items-center mb-6 text-center">
            <img src="./assets/github-logo.png" class="w-12 sm:w-16 mb-3">
            <h1 class="text-lg sm:text-xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <!-- Username -->
        <div class="mb-4">
            <label class="label">
                <span class="label-text">Username</span>
            </label>
            <input id="username" type="text" placeholder="Enter username" class="input input-bordered w-full" />
            <p class="text-xs text-blue-500 mt-1">Default: admin</p>
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label class="label">
                <span class="label-text">Password</span>
            </label>
            <input id="password" type="password" placeholder="Enter password" class="input input-bordered w-full" />
            <p class="text-xs text-blue-500 mt-1">Default: admin123</p>
        </div>

        <!-- Button -->
        <button id="loginBtn" class="btn btn-primary w-full mt-4">
            Sign In
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
