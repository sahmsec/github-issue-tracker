<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Github Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="card bg-base-100 shadow-xl w-96 p-8">
        <div class="flex flex-col items-center mb-6">
            <img src="./assets/github-logo.png" class="w-16 mb-2">
            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>

            <!-- input fields -->
            <div class="mt-4">
                <label class="label">Username</label>
                <input id="username" type="text" placeholder="Enter username" class="input input-bordered w-full" />
                <p class="text-xs text-blue-500 mt-1">Default: admin</p>
            </div>

            <div class="mt-4">
                <label class="label">Password</label>
                <input id="password" type="password" placeholder="Enter password" class="input input-bordered w-full" />
                <p class="text-xs text-blue-500 mt-1">Default: admin123</p>
            </div>

            <button id="loginBtn" class="btn btn-primary w-full mt-6">
                Sign In
            </button>

            <script src="script.js"></script>
        </div>
    </div>

</body>

</html>
