<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <!-- Navbar -->
    <nav class="navbar bg-base-100 shadow-md px-4 sm:px-8 lg:px-16 flex-wrap gap-4">
        <!-- left -->
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-8">
            <h1 class="font-bold text-xl">GitHub Issues Tracker</h1>
        </div>
        <!-- Right side -->
        <div class="ml-auto flex items-center gap-3">

            <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered w-64" />

            <button class="btn btn-primary">
                + New Issue
            </button>

        </div>

    </nav>

    <!-- Tabs section -->

    <div class="max-w-6xl mx-auto mt-10 sm:mt-16 px-4">

        <div class="bg-white p-6 rounded-xl shadow-sm">

            <div class="flex flex-wrap gap-3">

                <button id="allTab" class="w-32 h-10 rounded-md text-white flex items-center justify-center"
                    style="background:#4A00FF;">
                    All
                </button>

                <button id="openTab"
                    class="w-32 h-10 rounded-md border border-gray-300 text-gray-600 flex items-center justify-center">
                    Open
                </button>

                <button id="closedTab"
                    class="w-32 h-10 rounded-md border border-gray-300 text-gray-600 flex items-center justify-center">
                    Closed
                </button>

            </div>

        </div>

    </div>

    <!-- summary section -->
    <div class="max-w-6xl mx-auto mt-4 px-4">

        <div
            class="bg-white p-6 rounded-xl shadow-sm flex flex-col sm:flex-row gap-4 sm:justify-between sm:items-center">

            <!-- Left side -->
            <div class="flex items-center gap-4">

                <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
                    <img src="./assets/aperture.png" class="w-5">
                </div>

                <div>
                    <h2 class="font-semibold text-lg">50 Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>

            </div>


            <!-- Right side -->
            <div class="flex items-center gap-6 text-sm">

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                    <span>Open</span>
                </div>

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                    <span>Closed</span>
                </div>

            </div>

        </div>

    </div>

    <!-- issue container -->
    <div id="issuesContainer" class="max-w-6xl mx-auto mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 px-4">
    </div>

    <script src="script.js"></script>

</body>

</html>
