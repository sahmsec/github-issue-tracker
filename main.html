<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <!-- Navbar -->
    <nav class="navbar bg-base-100 shadow-md px-6">

        <!-- left -->
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-8">
            <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
        </div>
        <!-- Right side -->
        <div class="ml-auto flex items-center gap-3">

            <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered w-64" />

            <button class="btn btn-primary">
                + New Issue
            </button>

        </div>

    </nav>

</body>

</html>
